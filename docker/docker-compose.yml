# Local mode: inference in DEMO plane (CPU, no model download) + the web app.
#   docker compose -f docker/docker-compose.yml up --build
# Then open http://localhost:3000
services:
  inference:
    build:
      context: ..
      dockerfile: docker/Dockerfile.inference
      target: demo
    environment:
      STUDIO_DEMO: "1"
      STUDIO_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - inference
