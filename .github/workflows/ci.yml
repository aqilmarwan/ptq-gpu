name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.10
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Run inference
        run: python inference/inference.py
        env:
          STUDIO_BASE_MODEL: "stabilityai/stable-diffusion-xl-base-1.0"
          STUDIO_VARIANTS: "inference/variants.yaml"
          STUDIO_LORA_DIR: "inference/loras"
          STUDIO_CORS_ORIGINS: "http://localhost:3000,http://localhost:3100"
          STUDIO_MAX_STEPS: "100"
          STUDIO_MAX_DIM: "1024"
          STUDIO_DEMO: "true"
          STUDIO_DEMO_PROMPT: "A beautiful landscape painting"  