name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inference/requirements.txt
      - name: Install dependencies
        run: pip install -r inference/requirements.txt pytest
      - name: Run tests (demo plane)
        run: pytest inference -q
        env:
          STUDIO_DEMO: "true"
          STUDIO_CORS_ORIGINS: "http://localhost:3000,http://localhost:3100"
          STUDIO_MAX_STEPS: "100"
          STUDIO_MAX_DIM: "1024"
