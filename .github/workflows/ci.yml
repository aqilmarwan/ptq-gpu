name: CI

# test -> build -> push ECR -> deploy EKS
#
# Tests run on every push/PR. Build + deploy run only for pushes to main and
# require these repo settings:
#   Secrets:  AWS_DEPLOY_ROLE_ARN   (IAM role trusted for GitHub OIDC)
#   Vars:     AWS_REGION, ECR_REGISTRY (<acct>.dkr.ecr.<region>.amazonaws.com),
#             EKS_CLUSTER, INFERENCE_API_URL (browser-reachable inference LB URL)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------- tests ----
  inference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inference/requirements.txt
      - name: Install dependencies
        run: pip install -r inference/requirements.txt pytest
      - name: Run tests (demo plane)
        run: pytest inference -q
        env:
          STUDIO_DEMO: "true"
          STUDIO_CORS_ORIGINS: "http://localhost:3000,http://localhost:3100"
          STUDIO_MAX_STEPS: "100"
          STUDIO_MAX_DIM: "1024"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # -------------------------------------------------- build & push to ECR ----
  build:
    needs: [inference, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # federate into AWS via OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        # NOTE: the quantstudio-inference / quantstudio-web ECR repos must exist.
        # Create them once (the CI role only has push perms, not create):
        #   aws ecr create-repository --repository-name quantstudio-inference --region <region>
        #   aws ecr create-repository --repository-name quantstudio-web        --region <region>

      - uses: docker/setup-buildx-action@v3

      - name: Build & push inference image (GPU target)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.inference
          target: gpu
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/quantstudio-inference:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/quantstudio-inference:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.INFERENCE_API_URL }}
          tags: |
            ${{ vars.ECR_REGISTRY }}/quantstudio-web:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/quantstudio-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------- deploy EKS ------
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER }} --region ${{ vars.AWS_REGION }}

      - name: Apply manifests
        # Namespace first: `kubectl apply -f <dir>` orders files alphabetically,
        # so namespace.yaml would otherwise run after the namespaced resources.
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/

      - name: Roll out the freshly built images
        env:
          REGISTRY: ${{ vars.ECR_REGISTRY }}
          TAG: ${{ github.sha }}
        run: |
          kubectl -n quant-studio set image deployment/inference \
            inference=$REGISTRY/quantstudio-inference:$TAG
          kubectl -n quant-studio set image deployment/web \
            web=$REGISTRY/quantstudio-web:$TAG

      - name: Wait for rollouts
        run: |
          kubectl -n quant-studio rollout status deployment/inference --timeout=15m
          kubectl -n quant-studio rollout status deployment/web --timeout=5m
