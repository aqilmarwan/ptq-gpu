apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: quant-studio
  labels: { app: web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      nodeSelector:
        role: general
      containers:
        - name: web
          # NEXT_PUBLIC_API_URL is baked at build time (see Dockerfile.web), so the
          # image must be built with the inference LoadBalancer URL. CI overrides
          # the tag via `kubectl set image`.
          image: docker.io/DOCKERHUB_USERNAME/quantstudio-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests: { cpu: "100m", memory: 256Mi }
            limits: { cpu: "500m", memory: 512Mi }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 20
