apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: quant-studio
  labels: { app: web }
spec:
  # ClusterIP: fronted by the shared ALB (infra/k8s/ingress.yaml), which
  # terminates TLS and routes the apex domain here.
  type: ClusterIP
  selector: { app: web }
  ports:
    - name: http
      port: 80
      targetPort: 3000
