apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: quant-studio
  labels: { app: inference }
spec:
  # ClusterIP: the public entrypoint is the shared ALB (infra/k8s/ingress.yaml),
  # which terminates TLS and routes api.<domain> here.
  type: ClusterIP
  selector: { app: inference }
  ports:
    - name: http
      port: 80
      targetPort: 8000
