apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: quant-studio
  labels: { app: inference }
spec:
  replicas: 1
  selector:
    matchLabels: { app: inference }
  template:
    metadata:
      labels: { app: inference }
    spec:
      # S3 read access for the engine sync comes from this IRSA account
      # (created by eksctl; see infra/eksctl-cluster.yaml).
      serviceAccountName: inference
      # schedule onto the GPU node group (label set in eksctl-cluster.yaml)
      nodeSelector:
        role: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      # Sync the prebuilt TensorRT engine bundles from S3 into the shared volume
      # before the server starts. No HF download at runtime.
      initContainers:
        - name: fetch-engines
          image: amazon/aws-cli:2.17.0
          command: ["sh", "-c", "aws s3 sync \"$STUDIO_ENGINE_S3_URI\" /engines --only-show-errors"]
          env:
            - name: STUDIO_ENGINE_S3_URI
              value: "s3://quant-studio-engine-bucket"
          volumeMounts:
            - name: engines
              mountPath: /engines
      containers:
        - name: inference
          # CI overrides this with the ECR image via `kubectl set image`
          # (see .github/workflows/ci.yml); :latest is the manual fallback.
          image: ECR_REGISTRY/quantstudio-inference:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Only the web origin may call the API.
            - name: STUDIO_CORS_ORIGINS
              value: "https://ptq-gpu.vercel.com"
            - name: STUDIO_ENGINE_DIR
              value: /engines
            # Surfaced for clear errors if a bundle is missing (init container fetches).
            - name: STUDIO_ENGINE_S3_URI
              value: "s3://quant-studio-engine-bucket"
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              nvidia.com/gpu: "1"   # one L40S per pod
              memory: 30Gi
          # prebuilt TensorRT engine bundles (synced from S3 by the init container)
          volumeMounts:
            - name: engines
              mountPath: /engines
          startupProbe:            # generous: TRT + CUDA init on boot
            httpGet: { path: /healthz, port: 8000 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 20
      volumes:
        - name: engines
          emptyDir:
            sizeLimit: 60Gi
