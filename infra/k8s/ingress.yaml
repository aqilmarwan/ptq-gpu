# Internet-facing ALB exposing the inference API over HTTPS, provisioned by the
# AWS Load Balancer Controller (installed via infra/bootstrap.sh). TLS is
# terminated at the ALB with an ACM cert; HTTP is redirected to HTTPS.
#
# The web app is hosted on Vercel (see STUDIO_CORS_ORIGINS on the inference
# deployment), so the ALB fronts ONLY the inference service -- there's no
# in-cluster web host here. (The web Deployment/Service are kept as a
# self-hosted alternative; add an apex-host rule below if you drop Vercel.)
#
# Before applying, replace the two placeholders:
#   ACM_CERT_ARN  -> arn:aws:acm:<region>:<acct>:certificate/<id> covering api.<domain>
#   <domain>      -> your real domain (Route 53 ALIAS record api.<domain> -> this ALB)
#
# Then set Vercel's NEXT_PUBLIC_API_URL = https://api.<domain> and the inference
# STUDIO_CORS_ORIGINS to your Vercel origin, so the browser hits this ALB over
# HTTPS with no mixed-content or CORS block.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quant-studio
  namespace: quant-studio
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip            # register pod IPs (ClusterIP service)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"        # force HTTP -> HTTPS
    alb.ingress.kubernetes.io/certificate-arn: ACM_CERT_ARN
    alb.ingress.kubernetes.io/healthcheck-path: /healthz  # inference liveness route
    alb.ingress.kubernetes.io/tags: project=ptq-gpu,app=quant-studio
spec:
  ingressClassName: alb
  rules:
    - host: api.ptq-gpu.vercel.com   # replace example.com with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inference
                port: { number: 80 }
