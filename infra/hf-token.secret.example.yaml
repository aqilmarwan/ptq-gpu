# Hugging Face token for downloading the base SDXL weights on the real plane.
# Kept OUT of k8s/ so `kubectl apply -f infra/k8s/` never creates a placeholder
# secret. The inference deployment reads it via an OPTIONAL secretKeyRef, so the
# demo plane (no weights) runs fine without it.
#
# Preferred (don't commit the token):
#   kubectl -n quant-studio create secret generic hf-token \
#     --from-literal=token=hf_xxxxxxxxxxxxxxxxxxxxxxxx
#
# Or copy this file, fill in the base64 value, and apply it:
#   echo -n 'hf_xxx...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: quant-studio
type: Opaque
data:
  token: aGZfUkVQTEFDRV9NRQ==   # base64("hf_REPLACE_ME") -- replace before applying
