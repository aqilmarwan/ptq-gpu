# eksctl cluster for Image Gen Studio.
#
#   eksctl create cluster -f infra/eksctl-cluster.yaml
#   eksctl delete cluster -f infra/eksctl-cluster.yaml    # tear down (stops GPU $$)
#
# Two managed node groups, matched to what infra/k8s expects:
#   * general (role=general) -- cheap CPU nodes for the web Deployment.
#   * gpu-a10g (role=gpu)     -- A10G nodes, tainted so ONLY the inference pods
#                               (which tolerate nvidia.com/gpu) land on them.
#
# The gpu-a10g maxSize (3) is the ceiling the inference HPA scales into
# (infra/k8s/inference-hpa.yaml: maxReplicas 3). g5.2xlarge = 1x A10G (24GB),
# 8 vCPU, 32Gi RAM -- fits the inference pod's 22Gi memory limit + 1 GPU.

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: quant-studio
  region: us-east-1
  version: "1.30"
  tags:
    project: ptq-gpu
    app: quant-studio

iam:
  withOIDC: true   # required for IRSA + the EBS/LB controller addons below
  # IRSA roles for the controllers installed by infra/bootstrap.sh. eksctl
  # attaches the AWS-managed policies via its well-known-policy shortcuts.
  serviceAccounts:
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      wellKnownPolicies:
        awsLoadBalancerController: true
    - metadata:
        name: cluster-autoscaler
        namespace: kube-system
      wellKnownPolicies:
        autoScaler: true

# The cluster autoscaler and NVIDIA device plugin need these; eksctl also
# auto-installs the device plugin when it sees GPU instances in a node group.
addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver

managedNodeGroups:
  # ---- general-purpose CPU nodes (web, system pods) -----------------------
  - name: general
    instanceType: m5.large        # 2 vCPU, 8Gi
    minSize: 2
    maxSize: 4
    desiredCapacity: 2
    volumeSize: 40
    labels:
      role: general
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/quant-studio: "owned"

  # ---- GPU nodes (inference) ---------------------------------------------
  - name: gpu-a10g
    instanceType: g5.2xlarge      # 1x NVIDIA A10G (24GB), 8 vCPU, 32Gi
    minSize: 1
    maxSize: 3                     # == inference HPA maxReplicas
    desiredCapacity: 1
    volumeSize: 120               # room for the SDXL weight cache (emptyDir)
    amiFamily: AmazonLinux2       # GPU-optimised AMI + NVIDIA drivers selected automatically
    labels:
      role: gpu
    # Keep non-GPU workloads off the expensive nodes. Inference pods carry the
    # matching toleration (infra/k8s/inference-deployment.yaml).
    taints:
      - key: nvidia.com/gpu
        value: "true"
        effect: NoSchedule
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/quant-studio: "owned"
      k8s.io/cluster-autoscaler/node-template/label/role: "gpu"
