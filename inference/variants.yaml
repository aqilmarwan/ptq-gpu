# Servable SDXL 1.0 variants (precision x style), each backed by a prebuilt
# TensorRT engine bundle.
#
#   serving:   which engine bundle pipelines.py loads (<engine>/ under the engine
#              dir, mirrored from S3). `precision` is informational -- it's baked
#              into the engine at build time; `lora` names the LoRA compiled in.
#   registry:  the benchmarked metrics surfaced by GET /variants. The build flow
#              (pipelines/build_flow.py) writes these into MLflow and syncs them
#              here -- but every live request still measures its OWN latency /
#              VRAM / throughput honestly around the real denoise loop.
#
# Precisions map to what TensorRT actually does: FP16, INT8 (calibrated), and
# FP8 (Ada/Hopper, e.g. L40S). Adding a variant is a config edit: append a block,
# build its engine, restart.

# HF id the engines are built from (pipelines/build_engines.py). Not shown in the UI.
base_model: stabilityai/stable-diffusion-xl-base-1.0
# Human-friendly name surfaced by GET /variants -> the frontend `base` field.
base_label: SDXL 1.0

# LRU VRAM budget -- how many engine bundles stay hot in VRAM at once. Loading an
# (N+1)th evicts the least-recently-used one. Tune to your card.
max_resident: 2

variants:
  - id: fp16-base
    label: "FP16 - Base"
    precision: FP16
    style: Base
    blurb: "Reference quality. The baseline every variant is measured against."
    licence: "CreativeML OpenRAIL++-M"
    serving:
      engine: fp16-base
      precision: fp16
    registry:
      sizeGB: 13.0
      vramGB: 18.4
      stepsPerSec: 7.8
      quality: 98
      defaultSteps: 30

  - id: int8-base
    label: "INT8 - Base"
    precision: INT8
    style: Base
    blurb: "TensorRT INT8, entropy-calibrated. Near-FP16 quality, ~45% lighter."
    licence: "CreativeML OpenRAIL++-M"
    serving:
      engine: int8-base
      precision: int8
    registry:
      sizeGB: 7.1
      vramGB: 11.2
      stepsPerSec: 12.6
      quality: 95
      defaultSteps: 30

  - id: fp8-base
    label: "FP8 - Base"
    precision: FP8
    style: Base
    blurb: "TensorRT FP8 on Ada/Hopper. Fits comfortably, fastest base."
    licence: "CreativeML OpenRAIL++-M"
    serving:
      engine: fp8-base
      precision: fp8
    registry:
      sizeGB: 6.6
      vramGB: 9.6
      stepsPerSec: 16.4
      quality: 92
      defaultSteps: 28

  - id: fp16-lora
    label: "FP16 - LoRA"
    precision: FP16
    style: LoRA
    loraName: "Neon Atlas"
    blurb: "Custom DreamBooth-LoRA fused into an FP16 engine. Signature look, full fidelity."
    licence: "OpenRAIL++-M + LoRA (CC-BY)"
    serving:
      engine: fp16-lora
      precision: fp16
      lora: neon-atlas
    registry:
      sizeGB: 13.2
      vramGB: 18.7
      stepsPerSec: 7.6
      quality: 97
      defaultSteps: 30

  - id: fp8-lora
    label: "FP8 - LoRA"
    precision: FP8
    style: LoRA
    loraName: "Neon Atlas"
    blurb: "The LoRA style fused into an FP8 engine. The cheapest way to ship the brand look."
    licence: "OpenRAIL++-M + LoRA (CC-BY)"
    serving:
      engine: fp8-lora
      precision: fp8
      lora: neon-atlas
    registry:
      sizeGB: 6.8
      vramGB: 9.9
      stepsPerSec: 15.8
      quality: 90
      defaultSteps: 28
